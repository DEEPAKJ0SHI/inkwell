{% extends 'base.html' %}
{% block content %}
{% load crispy_forms_tags %}
<div style="display:flex;gap:2rem;align-items:flex-start;">
  {% include 'dashboard/sidebar.html' %}
  <div style="flex:1;">
    {% if perms.auth.add_user %}
    <h2 style="font-family:var(--serif);font-size:1.5rem;margin-bottom:1.5rem;">Edit User</h2>
    <div style="background:var(--card-bg);border:1px solid var(--border);border-radius:4px;padding:2rem;max-width:580px;">
      <form action="#" method="POST">
        {% csrf_token %}
        {{ form|crispy }}
        <div style="margin-top:1.2rem;display:flex;gap:0.75rem;">
          <button type="submit" class="btn btn-primary">Save Changes</button>
          <a href="{% url 'users' %}" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
    {% else %}
    <div style="background:var(--teal-light);border-radius:4px;padding:1.5rem;color:#115e59;"><i class="fas fa-lock"></i> Permission denied.</div>
    {% endif %}
  </div>
</div>
{% endblock %}
