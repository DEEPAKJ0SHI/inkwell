{% extends 'base.html' %}
{% block content %}
{% load crispy_forms_tags %}

<div style="min-height:60vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;">
  <div style="background:var(--card-bg);border:1px solid var(--border);border-radius:6px;padding:2.5rem;width:100%;max-width:440px;box-shadow:0 4px 24px rgba(0,0,0,0.07);">

    <div style="text-align:center;margin-bottom:2rem;">
      <a href="/" style="font-family:var(--serif);font-size:1.8rem;color:var(--ink);">Ink<span style="color:var(--teal)">Well</span></a>
      <p style="color:var(--muted);font-size:0.88rem;margin-top:0.4rem;">Welcome back — sign in to continue</p>
    </div>

    <form action="{% url 'login' %}" method="POST">
      {% csrf_token %}
      {{ form|crispy }}
      <button type="submit" class="btn btn-primary" style="width:100%;padding:0.7rem;font-size:0.95rem;margin-top:0.5rem;">Sign In</button>
    </form>

    <p style="text-align:center;margin-top:1.5rem;font-size:0.85rem;color:var(--muted);">
      Don't have an account? <a href="{% url 'register' %}" style="color:var(--teal);font-weight:600;">Create one free</a>
    </p>
  </div>
</div>

{% endblock %}
